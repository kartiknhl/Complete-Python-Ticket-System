<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fest Registration</title>
    <style>
        :root {
            color-scheme: dark;
            --bg: #0b1020;
            --panel: rgba(16, 23, 44, 0.92);
            --border: rgba(255, 255, 255, 0.08);
            --text: #eef2ff;
            --muted: #9aa7c7;
            --accent: #7c8cff;
            --danger: #ff6b6b;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: grid;
            place-items: center;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(124, 140, 255, 0.24), transparent 30%),
                linear-gradient(160deg, #050816 0%, #0b1020 55%, #060912 100%);
            color: var(--text);
            padding: 24px;
        }

        .card {
            width: min(100%, 520px);
            padding: 32px;
            border: 1px solid var(--border);
            border-radius: 24px;
            background: var(--panel);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.45);
            backdrop-filter: blur(18px);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 2rem;
        }

        p {
            margin: 0 0 24px;
            color: var(--muted);
            line-height: 1.5;
        }

        .error {
            margin-bottom: 16px;
            padding: 12px 14px;
            border-radius: 14px;
            background: rgba(255, 107, 107, 0.12);
            color: var(--danger);
            border: 1px solid rgba(255, 107, 107, 0.28);
        }

        .field {
            margin-bottom: 14px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--muted);
            font-size: 0.95rem;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            font: inherit;
            outline: none;
        }

        input:focus {
            border-color: rgba(124, 140, 255, 0.75);
            box-shadow: 0 0 0 4px rgba(124, 140, 255, 0.12);
        }

        button {
            width: 100%;
            margin-top: 4px;
            padding: 14px 16px;
            border: 0;
            border-radius: 14px;
            color: #08101f;
            background: linear-gradient(135deg, #9aa7ff 0%, #7c8cff 100%);
            font: inherit;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            filter: brightness(1.05);
        }
    </style>
</head>
<body>
    <main class="card">
        <h1>Ticket Registration</h1>
        <p>Register an attendee and send their QR ticket to WhatsApp.</p>

        {% if error %}
            <div class="error">{{ error }}</div>
            {% if existing_email %}
                <form action="/resend" method="POST" style="margin-bottom: 16px;">
                    <input type="hidden" name="email" value="{{ existing_email }}">
                    <button type="submit" style="width: 100%; margin-top: 0;">Resend My Ticket</button>
                </form>
            {% endif %}
        {% endif %}

        <form method="POST" autocomplete="off">
            <div class="field">
                <label for="name">Name</label>
                <input id="name" type="text" name="name" placeholder="Full name" required>
            </div>

            <div class="field">
                <label for="roll_no">Roll Number</label>
                <input id="roll_no" type="text" name="roll_no" placeholder="Roll number" required>
            </div>

            <div class="field">
                <label for="email">College Email Address</label>
                <input type="email" id="email" name="email" placeholder="College Email Address" required>
            </div>

            <button type="submit">Generate Ticket</button>
        </form>
    </main>
</body>
</html>
